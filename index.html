<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry Ping Pro | Managed Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="container">
        <header class="glass-header card">
            <div class="logo">PANTRY<span>PING</span></div>
            <div class="header-status">
                <button onclick="toggleTheme()" class="btn-icon">🌓 Theme</button>
                <div id="system-status" class="status-pill active">SYSTEM ACTIVE</div>
            </div>
        </header>

        <nav class="view-tabs">
            <button onclick="switchView('staff')" id="tab-staff" class="tab active-tab">Staff Portal</button>
            <button onclick="openSecurity()" id="tab-manager" class="tab">Manager Console</button>
        </nav>

        <main>
            <section id="staff-section" class="view-content">
                <div id="staff-login-area" class="card glass">
                    <h3>Staff Authentication</h3>
                    <input type="text" id="staff-id-entry" placeholder="Enter your ID Number">
                    <button onclick="staffLogin()" class="btn-primary">Verify Identity</button>
                </div>

                <div id="staff-action-area" class="card glass" style="display:none;">
                    <h3 id="greeting">Welcome</h3>
                    <div class="form-group">
                        <select id="staff-item-list"></select>
                        <input type="number" id="staff-qty" placeholder="Quantity to Deduct">
                        <button onclick="processTransaction('remove')" class="btn-remove">Confirm Removal</button>
                        <button onclick="logoutStaff()" class="btn-outline">Logout</button>
                    </div>
                </div>
            </section>

            <section id="manager-section" class="view-content" style="display:none;">
                <div class="mgr-grid">
                    <div class="card glass">
                        <h3>Create Staff Account</h3>
                        <input type="text" id="new-staff-id" placeholder="Assign ID Number">
                        <input type="text" id="new-staff-name" placeholder="Staff Full Name">
                        <select id="new-staff-gender">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <button onclick="createStaffAccount()" class="btn-success">Register Staff</button>
                    </div>

                    <div class="card glass">
                        <h3>Stock Inventory</h3>
                        <input type="text" id="mgr-item" placeholder="Item Name">
                        <input type="text" id="mgr-cat" placeholder="Category">
                        <input type="number" id="mgr-qty" placeholder="Quantity to Add">
                        <button onclick="processTransaction('add')" class="btn-success">Update Stock</button>
                    </div>
                </div>

                <div class="card glass">
                    <h3>👥 Staff Directory</h3>
                    <div class="table-scroll">
                        <table>
                            <thead><tr><th>ID</th><th>Name</th><th>Gender</th><th>Action</th></tr></thead>
                            <tbody id="staff-directory-body"></tbody>
                        </table>
                    </div>
                </div>

                <div class="card glass audit-log">
                    <h3>🛡️ System Audit Trail</h3>
                    <div id="audit-log" class="log-stream"></div>
                </div>

                <div class="card glass">
    <h3>Data Management</h3>
    <div class="mgr-btn-group">
        <button onclick="exportData()" class="btn-primary">📥 Export to Excel (CSV)</button>
        <button onclick="resetSystem()" class="btn-danger-outline">⚠️ Reset All Data</button>
    </div>
</div>
            </section>

            <section class="card glass">
                <div class="table-header">
                    <h3>Current Inventory</h3>
                    <div class="stats">Total: <span id="grand-total">0</span></div>
                </div>
                <div class="table-scroll">
                    <table>
                        <thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Last Action By</th></tr></thead>
                        <tbody id="inventory-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="security-modal" class="modal-overlay">
        <div class="modal glass">
            <h2>Manager Access</h2>
            <input type="password" id="pin-input" maxlength="4" placeholder="Enter PIN">
            <div class="modal-btns">
                <button onclick="validatePIN()" class="btn-primary">Unlock</button>
                <button onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
